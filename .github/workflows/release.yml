name: Release UF2 Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Determine tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Task (Taskfile)
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker build to generate UF2 files
        run: |
          echo "Building UF2 files for tag ${{ steps.tag.outputs.tag }}"
          task docker:all TAGS=${{ steps.tag.outputs.tag }}

      - name: Verify UF2 files
        run: |
          ls -lh dist/*.uf2

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "Automated release"
          else
            echo "Release $TAG already exists."
          fi

      - name: Upload UF2 assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" dist/*.uf2 --clobber