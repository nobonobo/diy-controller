name: Release UF2 Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        
      - name: Set up Task (Taskfile)
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker build to generate UF2 files
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "Building UF2 files for tag $TAG"
          task docker:all TAGS=$TAG

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release" \
            --draft false \
            --prerelease false

      - name: Upload UF2 assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} ./dist/*.uf2 --clobber
